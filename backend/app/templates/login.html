{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="bank-icon mb-3">
                        <i class="bi bi-bank text-danger" style="font-size: 3rem;"></i>
                    </div>
                    <h4 class="fw-bold">LANDA Bank</h4>
                    <p class="text-muted small">Sign in to your account</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3 rounded-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>

                <div class="text-center">
                    <small class="text-muted">
                        Don't have an account?
                        <a href="{{ url_for('auth.register') }}" class="text-danger fw-medium">Register</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
